okf_version: '0.1'
base:
  name: AV-OKF Knowledge Bundle
  roots:
  - path: knowledge
    exclude_patterns:
    - '**/.DS_Store'
    - '**/README.md'
  reserved_files:
    index: index.md
    log: log.md
  status_field: review_status
  link_resolution:
    external_refs:
    - source_manifest.md
relations:
  allowed:
  - routes_to
  - references
  - supports
  - covered_by
  - supersedes
  - conflicts_with
  - depends_on
profile:
  date_fields:
  - updated
  - approved_at
  - deprecated_at
  types:
    aircraft_index:
      required:
      - type
      - review_status
      - title
      - description
      - aircraft_family
      - knowledge_version
      - updated
      optional:
      - aircraft_variant
      - relations
      - related_topics
      - source_authority
      - revision
      - covered_rag_chunk_ids
      - covered_topic_record_ids
      - coverage_type
      - approved_by
      - approved_at
      - deprecated_at
      status_values:
      - raw_extracted
      - needs_ai_cleanup
      - needs_human_review
      - approved
      - rejected
      - deprecated
