services:
  caddy:
    image: caddy:2-alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "3000:80"
    volumes:
      - ./apps/web/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: av-okf-web:production-data-plane
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      knowledge-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment: &app-env
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      AV_OKF_BACKEND: production
      DATABASE_URL: postgresql://av_okf:av_okf@postgres:5432/av_okf
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: av-okf
      S3_ACCESS_KEY_ID: av_okf_minio
      S3_SECRET_ACCESS_KEY: av_okf_minio_secret
      S3_FORCE_PATH_STYLE: "true"
      AUTH_SECRET: ${AUTH_SECRET:-change-me-before-public-deployment}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-before-public-deployment}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      AV_OKF_SETTINGS_ENCRYPTION_KEY: ${AV_OKF_SETTINGS_ENCRYPTION_KEY:-}
      AV_OKF_MANIFEST_PATH: /data/okf-base.yaml
      AV_OKF_KNOWLEDGE_ROOT: /data/knowledge
      AV_OKF_KNOWLEDGE_VERSION: ${AV_OKF_KNOWLEDGE_VERSION:-0.1.0}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AV_OKF_TEST_AUTH_ENABLED: ${AV_OKF_TEST_AUTH_ENABLED:-true}
      AV_OKF_TEST_AUTH_EMAIL: ${AV_OKF_TEST_AUTH_EMAIL:-test@av-okf.local}
      AV_OKF_TEST_AUTH_PASSWORD: ${AV_OKF_TEST_AUTH_PASSWORD:-codex-local-test-password}
      AV_OKF_TEST_AUTH_NAME: ${AV_OKF_TEST_AUTH_NAME:-AV-OKF Test User}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RAG_CHUNK_TARGET_TOKENS: ${RAG_CHUNK_TARGET_TOKENS:-800}
      RAG_CHUNK_MAX_TOKENS: ${RAG_CHUNK_MAX_TOKENS:-1200}
      RAG_CHUNK_OVERLAP_TOKENS: ${RAG_CHUNK_OVERLAP_TOKENS:-120}
      RAG_EMBEDDING_MAX_TOKENS_PER_DOCUMENT: ${RAG_EMBEDDING_MAX_TOKENS_PER_DOCUMENT:-250000}
      RAG_EMBEDDING_MAX_TOKENS_PER_WORKSPACE_DAY: ${RAG_EMBEDDING_MAX_TOKENS_PER_WORKSPACE_DAY:-1000000}
      RAG_EMBEDDING_MAX_TOKENS_GLOBAL_DAY: ${RAG_EMBEDDING_MAX_TOKENS_GLOBAL_DAY:-5000000}
    expose:
      - "3000"
    volumes:
      - ./okf-base.yaml:/data/okf-base.yaml:ro
      - knowledge-data:/data/knowledge
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    image: av-okf-web:production-data-plane
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      knowledge-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment: *app-env
    command: ["node", "node_modules/tsx/dist/cli.mjs", "src/worker/extraction-worker.ts"]
    volumes:
      - ./okf-base.yaml:/data/okf-base.yaml:ro
      - knowledge-data:/data/knowledge
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -q '[e]xtraction-worker'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  migrate:
    image: av-okf-web:production-data-plane
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://av_okf:av_okf@postgres:5432/av_okf
    command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy"]
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: av_okf
      POSTGRES_USER: av_okf
      POSTGRES_PASSWORD: av_okf
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U av_okf -d av_okf"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    environment:
      MINIO_ROOT_USER: av_okf_minio
      MINIO_ROOT_PASSWORD: av_okf_minio_secret
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 av_okf_minio av_okf_minio_secret
        mc mb --ignore-existing local/av-okf
    restart: "no"

  knowledge-init:
    image: alpine:3.22
    command: ["sh", "-c", "mkdir -p /data/knowledge && chown -R 100:101 /data/knowledge"]
    volumes:
      - knowledge-data:/data/knowledge
    restart: "no"

volumes:
  caddy-config:
  caddy-data:
  knowledge-data:
  minio-data:
  postgres-data:
  redis-data:
