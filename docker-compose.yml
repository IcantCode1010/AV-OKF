services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: av-okf-web:stage-3-5
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      AV_OKF_DATA_ROOT: /data
    volumes:
      - av-okf-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  av-okf-data:
