name: route-coverage-eval

on:
  workflow_dispatch:

jobs:
  evaluate-routes:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AV_OKF_SETTINGS_ENCRYPTION_KEY: route-coverage-ci-settings-key
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Require evaluation provider key
        run: test -n "$OPENAI_API_KEY"

      - name: Configure container environment
        run: |
          cp apps/web/.env.example apps/web/.env
          printf '\nOPENAI_API_KEY=%s\n' "$OPENAI_API_KEY" >> apps/web/.env

      - name: Start production stack
        run: docker compose up -d --build --wait

      - name: Run route-coverage evaluation
        run: |
          docker cp docs/debug/route-coverage-retrieval-baseline-2026-07-19.json av-okf-worker-1:/tmp/route-baseline.json
          docker compose exec -T \
            -e EVAL_LLM_API_KEY="$OPENAI_API_KEY" \
            -e EVAL_BASELINE_PATH=/tmp/route-baseline.json \
            -e EVAL_OUTPUT_PATH=/tmp/route-report.json \
            worker node node_modules/tsx/dist/cli.mjs scripts/eval-retrieval-quality.mts routes ci
          docker cp av-okf-worker-1:/tmp/route-report.json route-coverage-report.json

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-coverage-report
          path: route-coverage-report.json
          if-no-files-found: warn

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200 web worker

      - name: Stop production stack
        if: always()
        run: docker compose down -v
