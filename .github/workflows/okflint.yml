name: okflint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-okf:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install okflint
        run: python -m pip install okflint==0.1.3 beartype

      - name: Validate OKF bundle
        run: okflint validate --manifest okf-base.yaml

